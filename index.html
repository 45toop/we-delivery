<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="google-site-verification" content="wa8dmlls3FWY8rXn9GbjnmEGBJ4ilUigdfEjbCKQ4KU" />
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>WE》DELIVERY</title>
 <style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: #ffaa55;
    background-size:cover;
    font-family:sans-serif;
}

/* blur layer */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter: blur(15px);
}

/* scene */
.scene{
    width:200px;
    height:200px;
    perspective:600px;
    position:relative;
}

/* cube */
.cube{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
    animation:spin 8s infinite linear;
}

/* cube faces */
.face{
    position:absolute;
    width:200px;
    height:200px;
    background:linear-gradient(145deg,#ff6655,#ff8899);
    border:2px solid rgba(0,0,0,0.2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

/* positioning */
.front  { transform: translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

@keyframes spin{
    from{ transform:rotateX(0) rotateY(0); }
    to{ transform:rotateX(360deg) rotateY(360deg); }
}

</style>
</head>

<body>
<div class="scene">
    <div class="cube">

        <div class="face front">WE》</div>
        <div class="face back">WE《</div>
        <div class="face right">♧</div>
        <div class="face left">WE》</div>
        <div class="face top">deliver</div>
        <div class="face bottom">♤</div>

    </div>
</div>
<script>

/* baada ya sekunde 6 open page nyingine */
setTimeout(function(){
    window.location.href="home.html";
},6000);

</script>
</body>
</html>
